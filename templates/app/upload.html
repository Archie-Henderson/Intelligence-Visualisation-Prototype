<!DOCTYPE html>
{% load static %}
<html>

    <head>
        <title>upload</title>
    </head>

    <body>
        <img src="{% static 'images/upload.png' %}"
            >

    <form method="post" action=".">
        {% csrf_token %}
        <label for="id_file">Upload file</label>

        <input type="file" name="file" id="id_file" required >

        <button type="submit" class="btn btn-sm btn-primary">Upload Text document, Image, or Audio file</button>
    </form>

    </body>

</html>
