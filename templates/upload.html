<!DOCTYPE html>
<html>
    <head>
        <title>Data Processing Upload Page</title>
    </head>

    <body>
        <h1>Upload File</h1>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>

        {% if msg %}<p>{{ msg }}</p>{% endif %}
        
    </body>
</html>
