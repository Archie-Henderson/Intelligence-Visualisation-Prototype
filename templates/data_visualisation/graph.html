<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v4.js"></script>

<body>
<div id="network_graph"></div>


<script>

// set the dimensions and margins of the graph
const margin = {top: window.innerHeight * 0.01, right: window.innerWidth * 0.01, bottom: window.innerHeight * 0.01, left: window.innerWidth * 0.01},
  width = window.innerWidth - margin.left - margin.right,
  height = window.innerHeight - margin.top - margin.bottom;

// append the svg object to the body of the page
const svg = d3.select("#network_graph")
.append("svg")
  .attr("width", window.innerWidth)
  .attr("height", window.innerHeight)
.append("g")
  .attr("transform",
        `translate(${margin.left}, ${margin.top})`);

d3.json("/static/graph_data.json", function(data) {

    // Initialize the links
  var link = svg
    .selectAll("line")
    .data(data.links)
    .enter()
    .append("line")
      .style("stroke", "#aaa")
      
  // Initialize the nodes
  var node = svg
    .selectAll("circle")
    .data(data.nodes)
    .enter()
    .append("circle")
      .attr("r", 8)
      .style("fill", "#69b3a2")

  node.append("title")
  .text(d => d.name);

  var text = svg
    .selectAll('text')
    .data(data.nodes)
    .enter()
    .append('text')
    .text(node => node.name)
    .attr('font-size', 8)
    .attr('dx', 5)
    .attr('dy', -5)

  // List forces to apply
  var simulation = d3.forceSimulation(data.nodes)
      .force("link", d3.forceLink()
            .id(function(d) { return d.id; })
            .links(data.links)
            .strength(2)
      )
      .force("charge", d3.forceManyBody().strength(-200))
      .force("x", d3.forceX(width/2))
      .force("y", d3.forceY(height/2))
      .on("end", ticked);

  // Add a drag behavior.
  d3.selectAll(".node").call(d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended));

  // Update node positions
  function ticked() {
    link
        .attr("x1", function(d) { return d.source.x; })
        .attr("y1", function(d) { return d.source.y; })
        .attr("x2", function(d) { return d.target.x; })
        .attr("y2", function(d) { return d.target.y; });

    node
         .attr("cx", function(d) { return d.x; })
         .attr("cy", function(d) { return d.y; });

    text
         .attr("dx", function(d) { return d.x+3; })
         .attr("dy", function(d) { return d.y-3; });
  }

  // Reheat the simulation when drag starts, and fix the subject position.
  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }

  // Update the subject (dragged node) position during drag.
  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }

  // Restore the target alpha so the simulation cools after dragging ends.
  // Unfix the subject position now that it’s no longer being dragged.
  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }
});
</script>
</body>
