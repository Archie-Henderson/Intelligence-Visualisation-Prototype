{% extends "web_page/base.html" %}

{% block title %}
Data Processing Upload Page
{% endblock %}

{% block content %}
<h1>Upload File</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="file" name="file" required>
    <button type="submit" class="btn btn-primary">Upload</button>
</form>


{% endblock %}
